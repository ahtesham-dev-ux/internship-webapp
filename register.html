<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Enterprise Intern Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-layout">

    <div id="toast-container" class="toast-container"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="sys-logo">
                    <i class="fa-solid fa-shapes"></i>
                    <span>NEXUS PORTAL</span>
                </div>
                <h1>Request Access</h1>
                <p>Initialize your corporate intern profile.</p>
            </div>
            
            <form id="register-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="reg-fname" placeholder="Jane" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" id="reg-lname" placeholder="Smith" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Corporate Email</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="reg-email" placeholder="j.smith@company.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Secure Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="reg-password" placeholder="••••••••" required>
                        <button type="button" class="pwd-toggle"><i class="fa-regular fa-eye"></i></button>
                    </div>
                    <div class="pwd-meter">
                        <div class="meter-track"><div class="meter-fill" id="pwd-fill"></div></div>
                        <span class="meter-text" id="pwd-text">Requirement: 8+ chars</span>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <span class="btn-text">Submit Request</span>
                    <i class="fa-solid fa-circle-notch fa-spin loader hidden"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>Already have an account? <a href="index.html" class="text-link">Sign In</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
