<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Enterprise Intern Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-layout">

    <div id="toast-container" class="toast-container"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="sys-logo">
                    <i class="fa-solid fa-shapes"></i>
                    <span>NEXUS PORTAL</span>
                </div>
                <h1>Sign in to your account</h1>
                <p>Welcome back to the Corporate Intern Management System.</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Corporate Email</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="e.g., j.doe@company.com" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                        <button type="button" class="pwd-toggle"><i class="fa-regular fa-eye"></i></button>
                    </div>
                </div>

                <div class="auth-options">
                    <label class="custom-check">
                        <input type="checkbox" id="remember-me">
                        <span class="check-box"></span>
                        <span class="check-label">Remember device</span>
                    </label>
                    <a href="#" class="text-link">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <span class="btn-text">Authenticate</span>
                    <i class="fa-solid fa-circle-notch fa-spin loader hidden"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p>New intern? <a href="register.html" class="text-link">Request account access</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
